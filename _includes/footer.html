<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Website</title>
  <style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    footer {
        text-align: center;
        margin: 30px auto;
    }

    footer .desktop-footer {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        max-width: 100%;
    }

    footer .desktop-footer .footer-each {
        margin: 0 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    footer .footer-each a {
        text-decoration: none;
        color: #000;
        font-weight: 300;
        word-wrap: normal;
        display: block;
        white-space: nowrap;
        position: relative;
    }

    footer .footer-each a span {
        display: block;
    }

    footer .footer-each a::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: -2px;
        width: 100%;
        height: 2px;
        background-color: #000;
        transform: scaleX(0);
        transition: transform 0.3s ease;
    }

    footer .footer-each a:hover::after {
        transform: scaleX(1);
    }

    footer .footer-each a:active {
        color: #555;
    }
  </style>
</head>
<body>
  <footer class="center">
    <div class="desktop-footer">
      <div class="footer-each">
        <!-- Empty space for potential future content -->
      </div>
      <div class="footer-each">
        <h5><a href="mailto:hzaid@gradcenter.cuny.edu"><span>hzaid@gradcenter.cuny.edu</span></a></h5>
      </div>
      <div class="footer-each">
        <h5><a href="mailto:zaidhajar1@gmail.com"><span>zaidhajar1@gmail.com</span></a></h5>
      </div>
      <div class="footer-each">
        <h5><a href="https://www.linkedin.com/in/hajar-zaid/" target="_blank" alt="LinkedIn"><span>LinkedIn</span></a></h5>
        <h5><a href="https://github.com/hajarzaid" target="_blank" alt="Github"><span>Github</span></a></h5>
      </div>
    </div>
  </footer>
</body>
</html>
