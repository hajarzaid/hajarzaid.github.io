<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Website</title>
  <style>
    footer {
        text-align: center;
        margin-bottom: 30px;
    }

    footer .desktop-footer {
        margin-left: auto;
        margin-right: auto;
        max-width: 45.33563em;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
    }

    footer .desktop-footer .footer-each {
        margin-right: 4%;
        text-align: center;
    }

    footer .desktop-footer .footer-each:last-child {
        margin-right: 0;
    }

    footer .footer-each a {
        text-decoration: none;
        background-image: none;
        color: #000;
        font-weight: 300;
        word-wrap: normal;
    }

    footer .footer-each a:active, footer .footer-each a:hover {
        outline-width: 0;
    }

    .contact-a span:before, .contact-a-mob span:before, .footer-each span:before {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        border-bottom: 2px solid #000;
        transition: .4s;
        -webkit-transform: scaleX(1);
        transform: scaleX(1);
    }

    .contact-a a:hover span:before, .contact-a-mob a:hover span:before, .footer-each a:hover span:before {
        content: '';
        -webkit-transform: scaleX(0);
        transform: scaleX(0);
    }
  </style>
</head>
<body>
  <footer class="center">
    <div class="desktop-footer">
      <div class="footer-each">
      </div>
      <div class="footer-each">
        <h5><a href="mailto:hzaid@gradcenter.cuny.edu"><span>hzaid</span><br><span>@gradcenter.cuny.edu</span></a></h5>
      </div>
      <div class="footer-each">
        <h5><a href="mailto:zaidhajar1@gmail.com"><span>zaidhajar1</span><br><span>@gmail.com</span></a></h5>
      </div>
      <div class="footer-each">
        <h5><a href="https://www.linkedin.com/in/hajar-zaid/" target="_blank" alt="LinkedIn"><span>LinkedIn</span></a></h5>
        <h5><a href="https://github.com/hajarzaid" target="_blank" alt="Github"><span>Github</span></a></h5>
      </div>
    </div>
  </footer>
</body>
</html>
